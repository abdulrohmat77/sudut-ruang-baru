document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"585ff772-007d-435c-8028-e3dafdc1d5fb\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"7224ecc6-de3f-4795-9704-13cd5e1d7952\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"3659657e-31fe-4568-984b-912b61f68b52\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- BRAND COLOR PALETTE ---------- */\n  /* Primary */\n  --sky-blue:    #4AB3D8;   /* accent, highlights, CTA, icons */\n  --deep-navy:   #043666;   /* main typography, backgrounds, headers */\n  --light-blue:  #E1F0F8;   /* soft backgrounds, infographics */\n\n  /* Secondary */\n  --royal-blue:  #0A3863;   /* alternative background, corporate */\n  --bright-blue: #045D93;   /* buttons, highlights, interactive */\n  --white:       #FEFEFE;   /* type on dark, negative space */\n\n  /* ---------- EXTENDED NEUTRAL / TINT SCALE ---------- */\n  /* Derived harmoniously from the navy/blue family (oklch-balanced) */\n  --navy-900: #022747;\n  --navy-800: #043666;   /* = deep-navy */\n  --navy-700: #0A3863;   /* = royal-blue */\n  --navy-600: #045D93;   /* = bright-blue */\n  --navy-500: #1E7FB8;\n  --navy-400: #4AB3D8;   /* = sky-blue */\n  --tint-300: #8FD0E8;\n  --tint-200: #BFE3F2;\n  --tint-100: #E1F0F8;   /* = light-blue */\n  --tint-050: #F2F9FC;\n\n  /* Neutral greys (cool, architectural) */\n  --ink:       #0E1B26;\n  --grey-700:  #2C3A45;\n  --grey-500:  #5A6B76;\n  --grey-300:  #A9B6BF;\n  --grey-200:  #D5DDE3;\n  --grey-100:  #EDF1F4;\n  --paper:     #FEFEFE;\n\n  /* ---------- SEMANTIC COLOR ROLES ---------- */\n  --bg:           var(--paper);\n  --bg-soft:      var(--tint-100);\n  --bg-dark:      var(--deep-navy);\n  --bg-dark-alt:  var(--royal-blue);\n\n  --fg1:          var(--deep-navy);  /* primary text */\n  --fg2:          var(--grey-500);   /* secondary text */\n  --fg-on-dark:   var(--white);\n  --fg-muted-dark: #B9CFE0;          /* secondary text on dark */\n\n  --accent:       var(--sky-blue);\n  --interactive:  var(--bright-blue);\n  --link:         var(--bright-blue);\n\n  --border:       var(--grey-200);\n  --border-soft:  var(--grey-100);\n  --border-dark:  rgba(255,255,255,0.14);\n\n  /* ---------- TYPOGRAPHY ---------- */\n  --font-sans: 'Montserrat', 'Poppins', 'Inter', system-ui, -apple-system, sans-serif;\n  --font-brand: 'Montserrat', 'Poppins', sans-serif;\n\n  /* Weights */\n  --w-regular: 400;\n  --w-medium:  500;\n  --w-semibold: 600;\n  --w-bold:    700;\n  --w-extrabold: 800;\n\n  /* Type scale (1.250 major-third, 16px base) */\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-md:   18px;\n  --text-lg:   22px;\n  --text-xl:   28px;\n  --text-2xl:  36px;\n  --text-3xl:  46px;\n  --text-4xl:  58px;\n  --text-5xl:  72px;\n\n  --leading-tight: 1.15;\n  --leading-snug:  1.3;\n  --leading-body:  1.5;   /* body 120–150% */\n\n  --tracking-tight: -0.01em;  /* headings -1% to 0% */\n  --tracking-normal: 0em;\n  --tracking-wide:  0.18em;   /* ARSITEK-style lockups / eyebrows */\n\n  /* ---------- SPACING (8pt base) ---------- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* ---------- RADII ---------- */\n  --radius-xs: 4px;\n  --radius-sm: 8px;\n  --radius-md: 12px;\n  --radius-lg: 18px;\n  --radius-xl: 28px;\n  --radius-pill: 999px;\n\n  /* ---------- ELEVATION / SHADOWS ---------- */\n  --shadow-xs: 0 1px 2px rgba(4,54,102,0.06);\n  --shadow-sm: 0 2px 8px rgba(4,54,102,0.08);\n  --shadow-md: 0 10px 28px rgba(4,54,102,0.10);\n  --shadow-lg: 0 24px 60px rgba(4,54,102,0.14);\n  --shadow-cta: 0 10px 24px rgba(4,179,216,0.30);\n\n  /* Brand gradient (from logo mark: sky-blue -> bright-blue) */\n  --grad-brand: linear-gradient(135deg, #5EC2E4 0%, #4AB3D8 32%, #045D93 100%);\n  --grad-navy:  linear-gradient(160deg, #0A3863 0%, #043666 100%);\n  --grad-mark:  linear-gradient(150deg, #6FC9E8 0%, #4AB3D8 45%, #0A3863 100%);\n}\n\n/* ============================================================\n   SEMANTIC TYPE CLASSES\n   ============================================================ */\n.h1, .h2, .h3, .h4 { font-family: var(--font-sans); color: var(--fg1); letter-spacing: var(--tracking-tight); }\n\n.display {\n  font-weight: var(--w-extrabold);\n  font-size: var(--text-5xl);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n}\n.h1 { font-weight: var(--w-bold); font-size: var(--text-4xl); line-height: var(--leading-tight); }\n.h2 { font-weight: var(--w-bold); font-size: var(--text-3xl); line-height: var(--leading-tight); }\n.h3 { font-weight: var(--w-semibold); font-size: var(--text-2xl); line-height: var(--leading-snug); }\n.h4 { font-weight: var(--w-semibold); font-size: var(--text-xl); line-height: var(--leading-snug); }\n\n.subhead {\n  font-weight: var(--w-semibold);\n  font-size: var(--text-lg);\n  color: var(--bright-blue);\n  letter-spacing: var(--tracking-normal);\n}\n\n.eyebrow {\n  font-weight: var(--w-semibold);\n  font-size: var(--text-sm);\n  letter-spacing: var(--tracking-wide);\n  text-transform: uppercase;\n  color: var(--sky-blue);\n}\n\n.body {\n  font-weight: var(--w-regular);\n  font-size: var(--text-base);\n  line-height: var(--leading-body);\n  color: var(--fg1);\n}\n.body-lg { font-size: var(--text-md); line-height: var(--leading-body); font-weight: var(--w-regular); color: var(--fg1); }\n.body-sm { font-size: var(--text-sm); line-height: var(--leading-body); color: var(--fg2); }\n\n.caption {\n  font-weight: var(--w-medium);\n  font-size: var(--text-xs);\n  letter-spacing: 0.02em;\n  color: var(--fg2);\n}\n<\u002Fstyle>\n  <style>\n    html,body { margin:0; padding:0; background:var(--grey-100); font-family:var(--font-sans); color:var(--fg1); }\n    *::-webkit-scrollbar { width:10px; height:10px; }\n    *::-webkit-scrollbar-thumb { background:var(--grey-300); border-radius:6px; border:2px solid var(--grey-100); }\n    *::-webkit-scrollbar-track { background:transparent; }\n    input, select, textarea, button { font-family:inherit; color:inherit; }\n    input[type=\"date\"]::-webkit-calendar-picker-indicator { cursor:pointer; opacity:0.65; }\n    .sr-in:focus, .sr-ta:focus { outline:none; border-color:var(--bright-blue); box-shadow:0 0 0 3px rgba(4,93,147,0.12); }\n    .sr-btn:hover { background:var(--bright-blue); }\n    .wa-btn:hover { background:#1ebe5b; }\n    .sync-btn:hover { background:rgba(255,255,255,0.18); }\n    .sync-chip:hover { background:var(--sky-blue); color:var(--deep-navy); }\n    .sr-ghost:hover { background:var(--tint-050); border-color:var(--bright-blue); color:var(--bright-blue); }\n    .del-x:hover { background:#E5484D !important; color:#fff !important; }\n    .seg-on { background:var(--deep-navy); color:#fff; }\n    .seg-off:hover { background:var(--tint-050); }\n    .chip:hover { background:var(--tint-100); }\n    .pull-x { background:var(--tint-100); color:var(--bright-blue); }\n    .pull-x:hover { background:var(--tint-200); }\n\n    @media print {\n      /* Margins live on the sheet, not the content — so the doc fills whatever\n         printable area the browser dialog gives it (no side cut-off / scaling). */\n      @page { size: A4; margin: 13mm 14mm; }\n      html, body { background:#fff !important; }\n      .no-print { display:none !important; }\n      .preview-wrap { position:static !important; height:auto !important; overflow:visible !important; background:#fff !important; padding:0 !important; display:block !important; }\n      .preview-inner { transform:none !important; width:auto !important; max-width:none !important; padding:0 !important; gap:0 !important; display:block !important; align-items:stretch !important; }\n      .workspace { display:block !important; }\n\n      /* CONTINUOUS FLOW: drop the fixed A4 frames so content paginates naturally\n         from top to bottom instead of being clipped at each forced page break. */\n      .a4 {\n        box-shadow:none !important; margin:0 !important; border:0 !important; border-radius:0 !important;\n        width:auto !important; min-height:0 !important; height:auto !important;\n        padding:0 !important; display:block !important; overflow:visible !important;\n      }\n      .a4 + .a4 { margin-top:6mm !important; }\n\n      /* Decorative per-page \"Halaman x/3\" footers don't belong in a continuous\n         flow — the browser's own footer handles page numbers. */\n      div[style*=\"margin-top: auto\"][style*=\"justify-content: space-between\"] { display:none !important; }\n\n      /* Never split these structural blocks across a page boundary. */\n      li, tr, thead, img,\n      div[style*=\"border-left: 3px solid var(--sky-blue)\"],\n      div[style*=\"linear-gradient(135deg\"],\n      div[style*=\"grid-template-columns: 1fr 1fr; gap: 6mm\"],\n      div[style*=\"grid-template-columns: 1fr 1fr; gap: 10mm\"],\n      div[style*=\"border: 1px solid var(--tint-200)\"] {\n        break-inside:avoid; page-break-inside:avoid;\n      }\n\n      /* Section headings stay attached to the content that follows them. */\n      div[style*=\"2px solid var(--sky-blue)\"] {\n        break-after:avoid; page-break-after:avoid;\n      }\n\n      /* Company footer flows as the closing block at the end of the document\n         (a fixed/running footer is unreliable in print and was dropping out). */\n      .doc-footer { margin-top:10mm !important; break-inside:avoid; page-break-inside:avoid; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"workspace\" style=\"display:grid;grid-template-columns:520px 1fr;min-height:100vh;background:var(--grey-100);\">\n\n  <!-- ========= LEFT: FORM PANEL ========= -->\n  <aside class=\"no-print\" style=\"background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;\">\n\n    <!-- Header -->\n    <div style=\"padding:18px 22px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--deep-navy) 0%,var(--royal-blue) 100%);color:#fff;\">\n      <div style=\"display:flex;align-items:center;gap:11px;\">\n        <div style=\"width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.16);display:flex;align-items:center;justify-content:center;flex:none;\"><img src=\"bc6546f3-a9d0-49e6-88f3-a67152107efd\" alt=\"SR\" style=\"width:25px;height:25px;object-fit:contain;display:block;\"><\u002Fdiv>\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"font-size:10px;letter-spacing:0.22em;color:var(--sky-blue);font-weight:600;\">SUDUT RUANG ARSITEK<\u002Fdiv>\n          <div style=\"font-size:15px;font-weight:700;letter-spacing:-0.01em;\">SPK Generator<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:right;font-size:10px;color:rgba(255,255,255,0.65);line-height:1.4;\">\n          <div>{{ pasalCount }} pasal · {{ kontrakType }}<\u002Fdiv>\n          <div>v3.2<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:12px;padding:8px 11px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);border-radius:8px;display:flex;align-items:center;gap:10px;\">\n        <div style=\"font-size:9px;letter-spacing:0.16em;color:rgba(255,255,255,0.55);font-weight:600;\">NO. SPK<\u002Fdiv>\n        <div style=\"flex:1;font-family:'Montserrat',monospace;font-size:13px;font-weight:700;letter-spacing:0.01em;color:#fff;\">{{ spkNoFull }}<\u002Fdiv>\n        <div style=\"width:7px;height:7px;border-radius:50%;background:{{ statusDot }};box-shadow:0 0 0 3px rgba(255,255,255,0.08);\"><\u002Fdiv>\n        <div style=\"font-size:10px;color:rgba(255,255,255,0.75);font-weight:500;\">{{ statusLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Form body -->\n    <div style=\"flex:1;overflow-y:auto;padding:16px 18px 24px;\">\n\n      <!-- §1 IDENTITAS SPK -->\n      <div style=\"margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-soft);\">\n          <div style=\"width:22px;height:22px;border-radius:6px;background:var(--deep-navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;\">1<\u002Fdiv>\n          <div style=\"font-size:11px;letter-spacing:0.18em;font-weight:700;color:var(--deep-navy);\">IDENTITAS SPK<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:90px 1fr;gap:10px;\">\n          <div>\n            <label style=\"display:block;font-size:9px;letter-spacing:0.14em;color:var(--grey-500);font-weight:600;margin-bottom:5px;\">NOMOR<\u002Flabel>\n            <input class=\"sr-in\" type=\"number\" min=\"1\" value=\"{{ spkSeq }}\" onchange=\"{{ setSpkSeq }}\" style=\"width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;text-align:center;font-family:'Montserrat',mo \u002Foption><\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:9px;letter-spacing:0.14em;color:var(--grey-500);font-weight:600;margin-bottom:4px;\">TIER<\u002Flabel>\n            <select class=\"sr-in\" value=\"{{ tier }}\" onchange=\"{{ setTier }}\" style=\"width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;background:#fff;\">\n              <sc-for list=\"{{ tierOptions }}\" as=\"t\" hint-placeholder-count=\"3\"><option value=\"{{ t }}\">{{ t }}<\u002Foption><\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:10px;padding:8px 10px;background:#fff;border:1px solid var(--tint-200);border-radius:8px;display:flex;align-items:center;gap:10px;\">\n          <div style=\"font-size:9px;letter-spacing:0.14em;color:var(--grey-500);font-weight:600;\">HARGA/m²<\u002Fdiv>\n          <div style=\"flex:1;font-family:'Montserrat',monospace;font-size:13px;font-weight:700;color:var(--deep-navy);\">{{ unitPriceRp }}<\u002Fdiv>\n          <button class=\"sr-ghost\" onclick=\"{{ applyPackage }}\" style=\"padding:6px 10px;border:1px solid var(--tint-200);background:#fff;border-radius:6px;font-size:10px;letter-spacing:0.08em;font-weight:700;color:var(--bright-blue);cursor:pointer;\">↻ RESET PAKET<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- §4 DETAIL PROYEK -->\n      <div style=\"margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-soft);\">\n          <div style=\"width:22px;height:22px;border-radius:6px;background:var(--deep-navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;\">4<\u002Fdiv>\n          <div style=\"font-size:11px;letter-spacing:0.18em;font-weight:700;color:var(--deep-navy);\">DETAIL PROYEK<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;\">\n          <div style=\"grid-column:1/-1;\">\n            <label style=\"display:block;font-size:9px;letter-spacing:0.14em;color:var(--grey-500);font-weight:600;margin-bottom:4px;\">NAMA PROYEK<\u002Flabel>\n            <input class=\"sr-in\" placeholder=\"Perencanaan Pembangunan Villa Sari\" value=\"{{ projectName }}\" onchange=\"{{ setProjectName }}\" style=\"width:100%;padding:9px 10px;border:1px solid {{ b_projectName }};border-radius:8px;font-size:12.5px;\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:9px;letter-spacing:0.14em;color:var(--grey-500);font-weight:600;margin-bottom:4px;\">JENIS PEKERJAAN<\u002Flabel>\n            <input class=\"sr-in\" placeholder=\"Perancangan Arsitektur\" value=\"{{ jenisPekerjaan }}\" onchange=\"{{ setJenisPekerjaan }}\" style=\"width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:9px;letter-spacing:0.14em;color:var(--grey-500);font-weight:600;margin-bottom:4px;\">KATEGORI<\u002Flabel>\n            <select class=\"sr-in\" value=\"{{ projKategori }}\" onchange=\"{{ setProjKategori }}\" style=\"width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;background:#fff;\">\n              <option value=\"Membangun baru\">Membangun baru<\u002Foption>\n              <option value=\"Renovasi\">Renovasi<\u002Foption>\n              <option value=\"Pengembangan\">Pengembangan / Tambah lantai<\u002Foption>\n              <option value=\"Interior fit-out\">Interior fit-out<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div style=\"grid-column:1/-1;\">\n            <label style=\"display:block;font-size:9px;letter-spacing:0.14em;color:var(--grey-500);font-weight:600;margin-bottom:4px;\">LOKA uk durasi yang diperlukan dalam proses perizinan.\",\n          \"Apabila keterlambatan terjadi karena faktor eksternal di luar kendali PIHAK KEDUA, PIHAK KEDUA dapat memperbarui nilai kontrak.\"\n        ] }\n      ] },\n      { title:\"INSPEKSI LAPANGAN\", blocks:[\n        { type:\"ul\", items:[\n          \"Kunjungan lapangan maksimal 1 (satu) kali per bulan.\",\n          \"Memastikan pelaksanaan konstruksi sesuai gambar perencanaan dan dokumen desain yang telah disetujui.\",\n          \"Hadir sewaktu-waktu bila dibutuhkan, dengan pemberitahuan minimal 1 (satu) minggu sebelumnya.\",\n          \"Memberikan gambar tambahan (sketsa klarifikasi) bila diperlukan.\",\n          \"Memberikan saran/arahan kepada Konsultan Pengawas atau Kontraktor bila dibutuhkan.\",\n          \"PIHAK KEDUA tidak berwenang melakukan tindakan manajerial lapangan (peran konsultan perencana, bukan pelaksana).\"\n        ] }\n      ] },\n      { title:\"PENYELESAIAN PERSELISIHAN\", blocks:[\n        { type:\"p\", text:\"Perselisihan diselesaikan terlebih dahulu melalui musyawarah untuk mufakat. Apabila tidak tercapai kesepakatan, Para Pihak sepakat menyelesaikan melalui Pengadilan Negeri di wilayah hukum yang berlaku.\" }\n      ] },\n      { title:\"PENGHENTIAN PEKERJAAN\", blocks:[\n        { type:\"sub\", text:\"Penghentian oleh PIHAK PERTAMA\" },\n        { type:\"p\", text:\"PIHAK PERTAMA berhak menghentikan pekerjaan dengan atau tanpa alasan melalui Berita Acara Penghentian, dan wajib menyelesaikan pembayaran sebesar 50% dari tahapan pembayaran berikutnya yang belum terbayarkan.\" },\n        { type:\"sub\", text:\"Penghentian oleh PIHAK KEDUA\" },\n        { type:\"p\", text:\"PIHAK KEDUA dapat menghentikan pekerjaan apabila terjadi salah satu kondisi berikut:\" },\n        { type:\"ul\", items:[\n          \"Perbedaan konsep mendasar selama lebih dari 5 (lima) kali sesi asistensi desain.\",\n          \"Tidak ada tanggapan PIHAK PERTAMA lebih dari 14 (empat belas) hari kerja.\",\n          \"PIHAK PERTAMA melanggar salah satu klausul dalam perjanjian ini.\",\n          \"Force majeure.\",\n          \"Jangka waktu pelaksanaan sebagaimana Pasal 5 telah terpenuhi.\"\n        ] },\n        { type:\"p\", text:\"Dalam hal ini, PIHAK KEDUA wajib menyerahkan seluruh produk yang telah diselesaikan dan mengembalikan pembayaran sebesar 50% dari tahapan terakhir yang telah dibayarkan.\" }\n      ] },\n      { title:\"PEKERJAAN BARU\", blocks:[\n        { type:\"p\", text:\"Pekerjaan yang tidak tercakup dalam SPK ini dapat disepakati melalui kontrak baru yang terpisah berdasarkan musyawarah kedua belah pihak. PIHAK KEDUA tetap bertanggung jawab penuh terhadap kontrak ini selama menjalankan kontrak baru, kecuali ada kesepakatan khusus secara tertulis.\" }\n      ] }\n    ];\n  }\n\n  setCRM(e){\n    const key = e.target.value;\n    const c = this.CRM.find(x=>x.key===key);\n    if (c) this.setState({ crmKey:key, clientName:c.name, clientPhone:c.phone, clientAddress:c.address, clientJabatan:c.jabatan });\n    else this.setState({ crmKey:\"\" });\n  }\n\n  setSpkSeq(e){ this.setState({ spkSeq: Math.max(1, Number(e.target.value)||1) }); }\n  setContractDate(e){ this.setState({ contractDate: e.target.value }); }\n\n  setMode(mode){\n    const cats = this.catOptions(mode);\n    const cat = cats.includes(this.state.category) ? this.state.category : cats[0];\n    const tiers = Object.keys(this.PRICES[mode][cat]);\n    const tier = tiers.includes(this.state.tier) ? this.state.tier : tiers[0];\n    this.setState({ mode, category:cat, tier }, ()=>this.applyPackage());\n  }\n  setCategory(e){\n    const cat = e.target.value;\n    const tiers = Object.keys(this.PRICES[this.state.mode][cat]);\n    const tier = tiers.includes(this.state.tier) ? this.state.tier : tiers[0];\n    this.setState({ category:cat, tier }, ()=>this.applyPackage());\n  }\n  setTier(e){\n    this.setState({ tier:e.target.value }, ()=>this.applyPackage());\n  }\n\n  setClientName(e){ this.setState({ clientName:e.target.value, crmKey:\"\" }); }\n  setClientJabatan(e){ this.setState({ clientJabatan:e.target.value }); }\n  setClientPhone(e){ this.setState({ clientPhone:e.target.value, crmKey:\"\" }); }\n  setClientAddress(e){ this.setState({ clientAddress:e.target.value, crmKey:\"\" }); }\n\n  setProjectName(e){ this.setState({ projectName:e.target.value }); }\n  setJenisPekerjaan(e){ this.setState({ jenisPekerjaan:e.target.value, jenisOverridden:true }); }\n  setProjKategori(e){ this.setState({ projKategori:e.target.value }); }\n  setLocation(e){ this.setState({ location:e.target.value }); }\n  setLandW(e){ this.setState({ landW:e.target.value }); }\n  setLandH(e){ this.setState({ landH:e.target.value }); }\n  setBuildArea(e){ this.setState({ buildArea:e.target.value }); }\n  setProgramRuang(e){ this.setState({ programRuang:e.target.value }); }\n\n  setFee(e){ this.setState({ feeOverride: e.target.value }); }\n  resetFee(){ this.setState({ feeOverride:null }); }\n  setDurationMonths(e){ this.setState({ durationMonths: Math.max(1, Number(e.target.value)||1) }); }\n\n  resetTermin(){ this.applyPackage(); }\n  addTermin(){\n    const arr = [...this.state.termin, { label:\"Termin baru\", pct:0, trigger:\"\" }];\n    this.setState({ termin: arr });\n  }\n  setTerminField(i, field, v){\n    const arr = this.state.termin.map((t,idx)=> idx===i ? { ...t, [field]: field===\"pct\" ? Number(v)||0 : v } : t);\n    this.setState({ termin: arr });\n  }\n  delTermin(i){\n    this.setState({ termin: this.state.termin.filter((_,idx)=>idx!==i) });\n  }\n\n  addScopeInc(){ this.setState({ scopeInc: [...this.state.scopeInc, \"\"] }); }\n  setScopeInc(i,v){ this.setState({ scopeInc: this.state.scopeInc.map((s,idx)=>idx===i?v:s) }); }\n  delScopeInc(i){ this.setState({ scopeInc: this.state.scopeInc.filter((_,idx)=>idx!==i) }); }\n  addScopeExc(){ this.setState({ scopeExc: [...this.state.scopeExc, \"\"] }); }\n  setScopeExc(i,v){ this.setState({ scopeExc: this.state.scopeExc.map((s,idx)=>idx===i?v:s) }); }\n  delScopeExc(i){ this.setState({ scopeExc: this.state.scopeExc.filter((_,idx)=>idx!==i) }); }\n\n  addTahap(){ this.setState({ tahapan:[...this.state.tahapan, { title:\"Tahap baru\", detail:\"\" }], untilPhase: this.state.tahapan.length+1 }); }\n  setTahapField(i,field,v){ this.setState({ tahapan: this.state.tahapan.map((t,idx)=>idx===i?{...t,[field]:v}:t) }); }\n  delTahap(i){ const arr = this.state.tahapan.filter((_,idx)=>idx!==i); this.setState({ tahapan: arr, untilPhase: Math.min(this.state.untilPhase, arr.length) }); }\n  setUntilPhase(e){ this.setState({ untilPhase: Math.max(1, Number(e.target.value)||1) }); }\n\n  setBcaNo(e){ this.setState({ bcaNo:e.target.value }); }\n  setBcaName(e){ this.setState({ bcaName:e.target.value }); }\n  setMandiriNo(e){ this.setState({ mandiriNo:e.target.value }); }\n  setMandiriName(e){ this.setState({ mandiriName:e.target.value }); }\n\n  doPrint(){ try { window.print(); } catch(e){} }\n  doSave(){\n    try {\n      const data = { ...this.state, spkNo: this.spkNoFull(), fee: this.computedFee() };\n      const json = JSON.stringify(data, null, 2);\n      const blob = new Blob([json], { type:\"application/json\" });\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement(\"a\");\n      a.href = url; a.download = `SPK ${this.pad3(this.state.spkSeq)} - ${(this.state.clientName||\"Klien\").trim()}.json`;\n      a.click();\n      setTimeout(()=>URL.revokeObjectURL(url), 600);\n    } catch(e){}\n  }\n\n  // ===== Render =====\n  renderVals(){\n    const s = this.state;\n    const fee = this.computedFee();\n    const feeAuto = this.unitPrice(s.mode, s.category, s.tier) * this.num(s.buildArea);\n    const landTotal = this.num(s.landW) * this.num(s.landH);\n    const pctTotal = (s.termin || []).reduce((a,t)=>a + (Number(t.pct)||0), 0);\n    const phaseLimit = Math.min(s.untilPhase || s.tahapan.length, s.tahapan.length);\n    const visibleTahapan = s.tahapan.slice(0, phaseLimit).map((t,i)=>({ num:i+1, title:t.title, detail:t.detail }));\n\n    // QA checks\n    const qa = [\n      { ok: !!s.clientName.trim(), text: \"Nama Pihak Pertama (klien) sudah terisi.\" },\n      { ok: !!s.projectName.trim(), text: \"Nama proyek, lokasi & luas sudah sesuai.\" },\n      { ok: fee > 0, text: \"Total fee > 0 (paket × luas atau manual).\" },\n      { ok: pctTotal === 100, text: \"Total termin = 100% (saat ini \" + pctTotal + \"%).\" },\n      { ok: s.bcaNo.length >= 6 && s.mandiriNo.length >= 6, text: \"Rekening BCA & Mandiri sudah terisi.\" },\n      { ok: s.tahapan.length >= 3, text: \"Minimum 3 tahap pekerjaan.\" }\n    ];\n    const allOk = qa.every(q=>q.ok);\n\n    // Mode-aware clause data (Pasal 4..N) + Pasal 2 bullets\n    const isDB = s.mode === \"db\";\n    const biayaBullets = isDB ? [\n      \"Nilai belum termasuk pajak (PPN & PPh).\",\n      \"Nilai disusun berdasarkan RAB/BOQ yang disepakati dan sudah termasuk material, upah tenaga kerja, peralatan, serta manajemen pelaksanaan sesuai spesifikasi.\",\n      \"Nilai belum termasuk: harga tanah, pengurusan perizinan (PBG), sambungan utilitas baru (PLN/PDAM), dan furnitur lepas — lihat Pasal 1.4.\",\n      \"Nilai bersifat lump sum fixed price, kecuali terdapat pekerjaan tambah/kurang yang disepakati.\",\n      \"Nilai bersifat mengikat sejak Down Payment (DP) diterima.\"\n    ] : [\n      \"Nilai belum termasuk pajak (PPn & PPh).\",\n      \"Nilai belum termasuk biaya perjalanan & akomodasi luar kota Surabaya.\",\n      \"Nilai bersifat mengikat sejak Down Payment (DP) diterima.\",\n      \"Nilai bersifat lump sum fixed price.\",\n      \"Pekerjaan tambahan di luar kesepakatan awal dihitung dalam kontrak baru yang terpisah.\"\n    ];\n    const clausesOut = this.buildClauses(s.mode, s.category, s.tier, this.durationWord(s.durationMonths)).map((c,i)=>({\n      no: i + 4,\n      title: c.title,\n      blocks: (c.blocks||[]).map(b=>({\n        isSub: b.type === \"sub\",\n        isP: b.type === \"p\",\n        isUl: b.type === \"ul\",\n        text: b.text || \"\",\n        items: b.items || []\n      }))\n    }));\n\n    // Termin output rows for preview\n    const terminOut = (s.termin||[]).map((t,i)=>({\n      idx: i+1,\n      label: t.label || \"—\",\n      trigger: t.trigger || \"—\",\n      pct: Number(t.pct)||0,\n      amount: this.fmtRp(fee * (Number(t.pct)||0) / 100),\n      bg: i % 2 ? \"#fff\" : \"var(--tint-050)\"\n    }));\n\n    // Termin form rows\n    const terminRows = (s.termin||[]).map((t,i)=>({\n      code: \"T\" + String(i+1).padStart(2,\"0\"),\n      label: t.label, pct: t.pct, trigger: t.trigger || \"\",\n      amountRp: this.fmtRp(fee * (Number(t.pct)||0) / 100),\n      setLabel: (e)=>this.setTerminField(i,\"label\",e.target.value),\n      setPct:   (e)=>this.setTerminField(i,\"pct\",  e.target.value),\n      setTrigger: (e)=>this.setTerminField(i,\"trigger\",e.target.value),\n      del: ()=>this.delTermin(i)\n    }));\n\n    // Scope rows\n    const scopeIncRows = (s.scopeInc||[]).map((v,i)=>({ v, set:(e)=>this.setScopeInc(i,e.target.value), del: ()=>this.delScopeInc(i) }));\n    const scopeExcRows = (s.scopeExc||[]).map((v,i)=>({ v, set:(e)=>this.setScopeExc(i,e.target.value), del: ()=>this.delScopeExc(i) }));\n\n    // Tahapan rows\n    const tahapanRows = (s.tahapan||[]).map((t,i)=>{\n      const active = (i+1) <= phaseLimit;\n      return {\n        num: i+1,\n        title: t.title, detail: t.detail,\n        bg: active ? \"var(--tint-050)\" : \"var(--grey-100)\",\n        bd: active ? \"var(--tint-200)\" : \"var(--border-soft)\",\n        numBg: active ? \"linear-gradient(135deg,var(--sky-blue),var(--bright-blue))\" : \"var(--grey-300)\",\n        numFg: \"#fff\",\n        fg: active ? \"var(--deep-navy)\" : \"var(--grey-500)\",\n        setTitle: (e)=>this.setTahapField(i,\"title\",e.target.value),\n        setDetail: (e)=>this.setTahapField(i,\"detail\",e.target.value),\n        del: ()=>this.delTahap(i)\n      };\n    });\n\n    // Mode segments\n    const modeSeg = [\n      { key:\"plan\", label:\"JASA PERENCANAAN\" },\n      { key:\"db\",   label:\"DESIGN & BUILD\" }\n    ].map(m=>({\n      label: m.label,\n      cls: s.mode===m.key ? \"seg-on\" : \"seg-off\",\n      bg: s.mode===m.key ? \"var(--deep-navy)\" : \"transparent\",\n      fg: s.mode===m.key ? \"#fff\" : \"var(--grey-700)\",\n      on: ()=>this.setMode(m.key)\n    }));\n\n    return {\n      // header chip\n      spkNoFull: this.spkNoFull(),\n      contractDate: s.contractDate,\n      contractDateLong: this.longDate(s.contractDate),\n      spkSeq: s.spkSeq,\n      statusDot: allOk ? \"#52C28C\" : \"#E5A23F\",\n      statusLabel: allOk ? \"Siap kirim\" : \"Belum lengkap\",\n\n      // setters\n      setSpkSeq: (e)=>this.setSpkSeq(e),\n      setContractDate: (e)=>this.setContractDate(e),\n\n      // CRM\n      crmKey: s.crmKey, crmList: this.CRM,\n      setCRM: (e)=>this.setCRM(e),\n      clientName: s.clientName, clientJabatan: s.clientJabatan, clientPhone: s.clientPhone, clientAddress: s.clientAddress,\n      setClientName: (e)=>this.setClientName(e), setClientJabatan: (e)=>this.setClientJabatan(e),\n      setClientPhone: (e)=>this.setClientPhone(e), setClientAddress: (e)=>this.setClientAddress(e),\n      b_clientName: s.clientName.trim() ? \"var(--border)\" : \"#E5A23F\",\n      b_clientPhone: this.num(s.clientPhone) > 0 ? \"var(--border)\" : \"var(--border)\",\n\n      // PACKAGE\n      modeSeg,\n      category: s.category, tier: s.tier,\n      catOptions: this.catOptions(s.mode),\n      tierOptions: Object.keys(this.PRICES[s.mode][s.category] || {}),\n      setCategory: (e)=>this.setCategory(e),\n      setTier: (e)=>this.setTier(e),\n      unitPriceRp: this.fmtRp(this.unitPrice(s.mode,s.category,s.tier)) + (s.mode===\"plan\" ? \" / m²\" : \" / m² (rentang)\"),\n      applyPackage: ()=>this.applyPackage(),\n\n      // Project details\n      projectName: s.projectName, jenisPekerjaan: s.jenisPekerjaan, projKategori: s.projKategori, location: s.location,\n      landW: s.landW, landH: s.landH, landTotal: landTotal || 0,\n      buildArea: s.buildArea, programRuang: s.programRuang,\n      setProjectName: (e)=>this.setProjectName(e), setJenisPekerjaan: (e)=>this.setJenisPekerjaan(e),\n      setProjKategori: (e)=>this.setProjKategori(e), setLocation: (e)=>this.setLocation(e),\n      setLandW: (e)=>this.setLandW(e), setLandH: (e)=>this.setLandH(e), setBuildArea: (e)=>this.setBuildArea(e),\n      setProgramRuang: (e)=>this.setProgramRuang(e),\n      b_projectName: s.projectName.trim() ? \"var(--border)\" : \"#E5A23F\",\n      b_location: s.location.trim() ? \"var(--border)\" : \"#E5A23F\",\n      b_buildArea: this.num(s.buildArea) > 0 ? \"var(--border)\" : \"#E5A23F\",\n\n      // Scope / Tahapan\n      scopeIncRows, scopeExcRows,\n      addScopeInc: ()=>this.addScopeInc(), addScopeExc: ()=>this.addScopeExc(),\n      tahapanRows, addTahap: ()=>this.addTahap(),\n      untilPhase: s.untilPhase, setUntilPhase: (e)=>this.setUntilPhase(e),\n      phaseNums: Array.from({length: s.tahapan.length || 1}, (_,i)=>i+1),\n\n      // Fee / termin\n      fee: s.feeOverride != null && s.feeOverride !== \"\" ? s.feeOverride : (this.unitPrice(s.mode,s.category,s.tier) * this.num(s.buildArea) || 0),\n      setFee: (e)=>this.setFee(e),\n      feeAutoRp: this.fmtRp(feeAuto),\n      resetFee: ()=>this.resetFee(),\n      b_fee: fee > 0 ? \"var(--border)\" : \"#E5A23F\",\n      durationMonths: s.durationMonths, setDurationMonths: (e)=>this.setDurationMonths(e),\n\n      terminRows, addTermin: ()=>this.addTermin(), resetTermin: ()=>this.resetTermin(),\n      pctTotalLabel: pctTotal,\n      pctColor: pctTotal === 100 ? \"#2B8F5C\" : \"#E5A23F\",\n\n      // Bank\n      bcaNo: s.bcaNo, bcaName: s.bcaName, mandiriNo: s.mandiriNo, mandiriName: s.mandiriName,\n      setBcaNo: (e)=>this.setBcaNo(e), setBcaName: (e)=>this.setBcaName(e),\n      setMandiriNo: (e)=>this.setMandiriNo(e), setMandiriName: (e)=>this.setMandiriName(e),\n\n      // QA\n      qaItems: qa.map(q=>({\n        text: q.text,\n        mark: q.ok ? \"✓\" : \"✗\",\n        iconBg: q.ok ? \"#1F8A5B\" : \"#E5484D\",\n        fg: q.ok ? \"#EAF6FB\" : \"#FFC7C7\",\n        fw: q.ok ? \"400\" : \"600\"\n      })),\n      qaPass: qa.filter(q=>q.ok).length,\n      qaTotal: qa.length,\n      qaCountBg: allOk ? \"#1F8A5B\" : \"#E5484D\",\n      qaSummaryMark: allOk ? \"✓\" : \"!\",\n      qaSummary: allOk\n        ? \"Semua lengkap — dokumen siap dicetak & dikirim.\"\n        : (qa.filter(q=>!q.ok).length + \" item belum lengkap. Periksa tanda ✗ di atas sebelum mengirim.\"),\n      qaSummaryBg: allOk ? \"rgba(31,138,91,0.20)\" : \"rgba(229,72,77,0.18)\",\n      qaSummaryBorder: allOk ? \"#1F8A5B\" : \"#E5484D\",\n      qaSummaryFg: allOk ? \"#7EE0B0\" : \"#FFB4B4\",\n\n      // Actions\n      companyEmail: \"admin\" + String.fromCharCode(64) + \"sudutruang.com\",\n      doPrint: ()=>this.doPrint(), doSave: ()=>this.doSave(),\n      sendWA: ()=>this.sendWA(),\n\n      // Sync / import\n      handoffAvail: s.handoffAvail, handoffLabel: s.handoffLabel,\n      importHandoff: ()=>this.importHandoff(),\n      pasteOpen: s.pasteOpen, togglePaste: ()=>this.togglePaste(),\n      importText: s.importText, setImportText: (e)=>this.setImportText(e),\n      applyPaste: ()=>this.applyPaste(), loadSample: ()=>this.loadSample(),\n      importFile: ()=>this.importFile(),\n\n      // Toast\n      toastMsg: s.toastMsg,\n      toastBg: s.toastKind === \"err\" ? \"#C0492F\" : \"var(--deep-navy)\",\n      toastIcon: s.toastKind === \"err\" ? \"!\" : \"✓\",\n\n      // ===== Preview-output values =====\n      clientNameOut: s.clientName.trim() || \"—\",\n      clientAddressOut: s.clientAddress.trim() || \"—\",\n      clientPhoneOut: s.clientPhone.trim() || \"—\",\n      projectNameOut: s.projectName.trim() || \"—\",\n      locationOut: s.location.trim() || \"—\",\n      landAreaOut: (landTotal > 0) ? `${this.num(s.landW)} × ${this.num(s.landH)} m = ${landTotal} m²` : \"—\",\n      buildAreaOut: this.num(s.buildArea) > 0 ? `${this.num(s.buildArea)} m²` : \"—\",\n      programRuangOut: s.programRuang.trim() || \"—\",\n      scopeInc: s.scopeInc.filter(x=>String(x||\"\").trim()),\n      scopeExc: s.scopeExc.filter(x=>String(x||\"\").trim()),\n      tahapan: visibleTahapan,\n      feeRp: this.fmtRp(fee),\n      terbilang: this.terbilang(fee),\n      terminOut,\n      durationWords: this.durationWord(s.durationMonths),\n\n      // ===== Klausul / pasal dinamis (mode-aware) =====\n      isDB,\n      isPlan: !isDB,\n      kontrakType: isDB ? \"Design & Build\" : \"Lump Sum\",\n      pasalCount: 3 + clausesOut.length,\n      biayaBullets,\n      clausesOut\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
