<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ACOS · Sudut Ruang Architecture Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #04203a; }
  body { font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; }
  #root { height: 100vh; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  input::placeholder { color: #5F7C97; }
  .ac-row:hover { background: rgba(74,179,216,0.08) !important; }
  .ac-trow:hover { background: rgba(74,179,216,0.06); }
  @keyframes acpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes acspin { to { transform: rotate(360deg); } }
  @keyframes acslide { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes acflow { 0% { left: 0; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { left: 32px; opacity: 0; } }
  .loadwrap { position: fixed; inset: 0; display: grid; place-items: center; background: #04203a; z-index: 999; transition: opacity .4s; }
</style>
</head>
<body style="background-color: rgb(255, 255, 255)">
<div id="root"></div>
<div class="loadwrap" id="loadwrap">
  <div style="text-align:center">
    <div style="width:46px;height:46px;border:3px solid rgba(74,179,216,0.2);border-top-color:#4AB3D8;border-radius:50%;margin:0 auto 16px;animation:acspin .8s linear infinite"></div>
    <div style="color:#4AB3D8;font-family:Montserrat;font-weight:800;letter-spacing:3px;font-size:13px">ACOS</div>
    <div style="color:#5F7C97;font-family:Montserrat;font-size:10px;letter-spacing:2px;margin-top:4px">MEMUAT COMMAND CENTER</div>
  </div>
</div>

<script src="data.js"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="login.jsx"></script>
<script type="text/babel" src="command.jsx"></script>
<script type="text/babel" src="automation.jsx"></script>
<script type="text/babel" src="flow.jsx"></script>
<script type="text/babel" src="crm.jsx"></script>
<script type="text/babel" src="modules.jsx"></script>
<script type="text/babel" src="blueprint.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script>
  // hide loader once React mounts
  const obs = new MutationObserver(() => {
    if (document.getElementById("root").children.length > 0) {
      const lw = document.getElementById("loadwrap");
      if (lw) { lw.style.opacity = "0"; setTimeout(() => lw.remove(), 400); }
      obs.disconnect();
    }
  });
  obs.observe(document.getElementById("root"), { childList: true });
</script>
</body>
</html>
